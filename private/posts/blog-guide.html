<script>
    renderSidebar('memo');

    async function decryptAndShow(pw) {
        const data = JSON.parse(document.getElementById('encrypted-data').textContent);
        const html = await AUTH.decryptContent(data.content, pw);
        if (html) {
            document.getElementById('post-body').innerHTML = html;
            document.getElementById('locked-view').style.display = 'none';
            document.getElementById('unlocked-view').style.display = 'block';
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const pw = AUTH.getPassword();
        if (pw && AUTH.isAuthenticated()) { await decryptAndShow(pw); }
    });

    function onAuthSuccess(pw) { decryptAndShow(pw); }

    const _origUpdate = updateAuthUI;
    updateAuthUI = function() {
        _origUpdate();
        const pw = AUTH.getPassword();
        if (pw && AUTH.isAuthenticated()) { decryptAndShow(pw); }
    };
</script>
