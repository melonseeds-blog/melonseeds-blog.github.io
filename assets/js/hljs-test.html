<h1>Prism.js vs highlight.js C++ 비교</h1>

<h2>1. Prism.js (One Dark)</h2>
<p class="desc">현재 사용 중. vector, string 등 STL 타입 인식 부족.</p>
<div class="frame"><iframe srcdoc='
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-one-dark.min.css">
<style>body{margin:0;} pre{margin:0!important;border-radius:0!important;font-size:14px!important;} .token.comment{font-style:normal;color:#6a9955;} .token.class-name{color:#4ec9b0;}</style>
<pre class="language-cpp"><code class="language-cpp">#include &lt;vector&gt;
#include &lt;iostream&gt;
#include &lt;string&gt;
using namespace std;

// 벡터 사용 예시
int main() {
    vector&lt;int&gt; v = {1, 2, 3, 4, 5};
    vector&lt;int&gt; v2(10, 0);
    string name = "Melon Seeds";

    v.push_back(6);      // 끝에 추가
    v.pop_back();        // 끝에서 제거
    v.size();            // 크기
    v.empty();           // 비었는지

    map&lt;string, int&gt; m;
    m["apple"] = 3;

    for (auto&amp; x : v) {
        cout &lt;&lt; name &lt;&lt; ": " &lt;&lt; x &lt;&lt; endl;
    }
    return 0;
}</code></pre>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
'></iframe></div>
