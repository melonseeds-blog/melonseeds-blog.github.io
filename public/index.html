<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Posts - Melon Seeds</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="top-nav">
    <div class="top-nav-inner">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <a href="../index.html" class="nav-logo">
                <span class="nav-logo-title">Melon Seeds</span>
            </a>
        </div>
        <div class="nav-right">
            <div class="nav-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="검색..."></div>
            <button class="nav-auth" id="nav-lock" onclick="showAuthModal()"><i class="fa-solid fa-lock"></i> 비공개</button>
        </div>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fa-solid fa-globe"></i> Public Posts</h1>
            <p>공개 글 목록</p>
        </div>
        <div class="posts-list">
            <div class="post-card">
                <div class="post-thumb"><span class="melon-icon"></span></div>
                <div class="post-card-body">
                    <div class="post-card-tags">
                        <span class="post-tag public">PUBLIC</span>
                        <span class="post-tag cat">Blog</span>
                    </div>
                    <h3><a href="posts/hello-world.html">블로그를 시작합니다</a></h3>
                    <p class="excerpt">GitHub Pages 기반 기술 블로그의 첫 글입니다. 블로그 구조와 사용 방법을 소개합니다.</p>
                    <div class="post-card-footer">
                        <span><i class="fa-regular fa-calendar"></i> 2026-03-24</span>
                        <span><i class="fa-regular fa-clock"></i> 3 min</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="site-footer"><span class="melon-icon"></span> Melon Seeds — Powered by GitHub Pages — Generated with Claude</div>

<div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
        <div class="auth-icon"><span class="melon-icon"></span></div>
        <h3>비공개 콘텐츠 인증</h3>
        <p>비밀번호를 입력하면 비공개 글을 볼 수 있습니다.</p>
        <input type="password" id="auth-password" placeholder="비밀번호">
        <button class="auth-btn" onclick="handleLogin()">인증</button>
        <div class="auth-error" id="auth-error">비밀번호가 올바르지 않습니다.</div>
        <button class="auth-cancel" onclick="hideAuthModal()">취소</button>
    </div>
</div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    renderSidebar(params.get('cat') || '');
</script>
</body>
</html>
